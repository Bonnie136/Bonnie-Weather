<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>My Weather Application</title>
  </head>
  <body>
    <div class="app-all">
      <img
        class="app-logo"
        src="src/Bonnie Weather Logo.PNG"
        alt="Bonnie Weather Logo"
        class="logo"
      />
      <form id="search-form">
        <input
          class="search-form-input"
          id="search-form-input"
          type="text"
          placeholder="Enter a city.."
        />
        <input class="search-form-button" type="submit" value="Search" />
      </form>
      <div class="main-text">
        <div class="current-weather">
          <h1 id="city-search">Norwich</h1>
          <div class="current-details">
            <div id="current-date"></div>
            <br />
            <div class="current-temp">
              <span class="icon" id="todays-icon">☁️</span
              ><span id="todays-temp"> 8</span>°C
            </div>
            <br />
            <div class="spacing">light drizzle</div>
            <strong>12°C</strong>
            | <span class="min-temp">6°C</span>
            <br />
            <br />
            <div class="spacing">Humidity: 94%</div>
            <div>Wind: 7.2km/h</div>
          </div>
        </div>
        <div class="forecast">
          <ul>
            <li>
              Thu ☀️
              <strong>12°C</strong>
              | <span class="min-temp">6°C</span>
            </li>
            <li>
              Fri ☀️
              <strong>12°C</strong>
              | <span class="min-temp">6°C</span>
            </li>
            <li>
              Sat ☀️
              <strong>12°C</strong>
              | <span class="min-temp">6°C</span>
            </li>
            <li>
              Sun ☀️
              <strong>12°C</strong>
              | <span class="min-temp">6°C</span>
            </li>
            <li>
              Mon ☀️
              <strong>12°C</strong>
              | <span class="min-temp">6°C</span>
            </li>
            <li>
              Tue ☀️
              <strong>12°C</strong>
              | <span class="min-temp">6°C</span>
            </li>
          </ul>
        </div>
      </div>
      <p class="footer">
        This project was coded by
        <a href="https://github.com/Bonnie136" target="_blank">Bonnie Wells</a>
        and is
        <a href="https://github.com/Bonnie136/Bonnie-Weather" target="_blank"
          >on GitHub</a
        >
        and
        <a href="https://bonnie-weather.netlify.app/" target="_blank"
          >hosted by Netlify</a
        >
      </p>
    </div>
  </body>
  <script src="src/index.js"></script>
</html>
